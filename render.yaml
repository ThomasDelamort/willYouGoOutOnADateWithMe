# Render Blueprint — provisions the web service + Postgres in one go.
# In the Render dashboard: New + → Blueprint → pick this repo.
services:
  - type: web
    name: will-you-go-out-with-me
    runtime: node
    plan: free
    # Monorepo: install both packages, build the frontend, then start the backend.
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Pulls the connection string from the database defined below.
      - key: DATABASE_URL
        fromDatabase:
          name: date-db
          property: connectionString
      # Render's managed Postgres requires SSL.
      - key: PGSSL
        value: "true"
      # Optional email notifications — set these in the dashboard, not here.
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: NOTIFY_TO
        sync: false

databases:
  - name: date-db
    plan: free
