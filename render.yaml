# Render Blueprint — web service only. Database is hosted on Neon.
# In the Render dashboard: New + → Blueprint → pick this repo.
# After it deploys, set DATABASE_URL (from Neon) in the service's Environment tab.
services:
  - type: web
    name: will-you-go-out-with-me
    runtime: node
    plan: free
    # Monorepo: install both packages, build the frontend, then start the backend.
    buildCommand: npm install --prefix backend && npm install --include=dev --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Neon connection string — set in the dashboard (kept out of the repo).
      - key: DATABASE_URL
        sync: false
      # Neon requires SSL.
      - key: PGSSL
        value: "true"
      # Optional email notifications — set these in the dashboard if you want them.
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: NOTIFY_TO
        sync: false
